<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recycle Check</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-success">
        Waste Type Checker
    </h1>

    <div class="mt-4">

        <label>Select Waste Type</label>

        <select id="wasteType" class="form-control">

            <option>Plastic</option>
            <option>Paper</option>
            <option>Metal</option>
            <option>E-Waste</option>

        </select>

        <button class="btn btn-success mt-3" onclick="checkWaste()">
            Check Waste
        </button>

        <div id="result" class="mt-4"></div>

    </div>

</div>

<script>

function checkWaste(){

    let waste =
    document.getElementById("wasteType").value;

    let result =
    document.getElementById("result");

    if(waste==="Plastic"){
        result.innerHTML=
        "♻️ Recyclable <br> Price: ₹20/kg";
    }

    else if(waste==="Paper"){
        result.innerHTML=
        "♻️ Recyclable <br> Price: ₹15/kg";
    }

    else if(waste==="Metal"){
        result.innerHTML=
        "♻️ Recyclable <br> Price: ₹40/kg";
    }

    else{
        result.innerHTML=
        "♻️ Special Recycling Process <br> Price: ₹50/kg";
    }

}

</script>

</body>
</html>
