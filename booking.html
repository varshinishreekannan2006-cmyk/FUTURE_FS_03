<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Pickup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("9iiTGaO3ml69ETt_W");

function bookPickup(){

    let params = {

        name: document.getElementById("name").value,

        phone: document.getElementById("phone").value,

        address: document.getElementById("address").value,

        wasteType: document.getElementById("wasteType").value,

        date: document.getElementById("date").value

    };

    emailjs.send(
        "service_y7hss54",
        "template_6lujzxm",
        params
    )

    .then(function(){

        document.getElementById("message").innerHTML =
        "<h4 class='text-success'>✅ Booking Sent To Email Successfully!</h4>";

    })

    .catch(function(error){

        document.getElementById("message").innerHTML =
        "<h4 class='text-danger'>❌ Failed To Send Email</h4>";

        console.log(error);

    });

}

</script>

<body>

<div class="container mt-5">

    <h1 class="text-center text-success">
        Schedule Waste Pickup
    </h1>

    <div class="mt-4">

        <label>Name</label>
        <input type="text" id="name" class="form-control">

        <label class="mt-3">Phone Number</label>
        <input type="text" id="phone" class="form-control">

        <label class="mt-3">Address</label>
        <textarea id="address" class="form-control"></textarea>

        <label class="mt-3">Waste Type</label>
        <select id="wasteType" class="form-control">

            <option>Plastic</option>
            <option>Paper</option>
            <option>Metal</option>
            <option>E-Waste</option>

        </select>

        <label class="mt-3">Pickup Date</label>
        <input type="date" id="date" class="form-control">

        <button
            class="btn btn-success btn-lg mt-3"
            onclick="bookPickup()">

                Book Pickup

        </button>

        <div id="message" class="mt-4"></div>

    </div>

</div>

</body>
</html>
