<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Environmental Impact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center text-success">
        Environmental Impact Calculator
    </h1>

    <label class="mt-3">
        Select Waste Type
    </label>

    <select id="wasteType" class="form-control">

        <option>Paper</option>
        <option>Plastic</option>
        <option>Metal</option>

    </select>

    <label class="mt-3">
        Enter Weight (kg)
    </label>

    <input
        type="number"
        id="weight"
        class="form-control"
        placeholder="Enter weight">

    <button
        class="btn btn-success mt-3"
        onclick="calculateImpact()">

        Calculate Impact

    </button>

    <div id="result" class="mt-4"></div>

</div>

<script>

function calculateImpact(){

    let waste =
    document.getElementById("wasteType").value;

    let weight =
    Number(document.getElementById("weight").value);

    let trees = 0;
    let water = 0;
    let co2 = 0;

    if(waste==="Paper"){

        trees = weight * 0.2;
        water = weight * 10;
        co2 = weight * 0.5;

    }

    else if(waste==="Plastic"){

        trees = 0;
        water = weight * 5;
        co2 = weight * 0.8;

    }

    else if(waste==="Metal"){

        trees = 0;
        water = weight * 8;
        co2 = weight * 1;

    }

    document.getElementById("result").innerHTML =

    "<h4>🌳 Trees Saved: " + trees + "</h4>" +
    "<h4>💧 Water Saved: " + water + " Liters</h4>" +
    "<h4>🌍 CO₂ Reduced: " + co2 + " kg</h4>";

}

</script>

</body>
</html>
